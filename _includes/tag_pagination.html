<nav class="pagination" role="pagination">
    {% if paginator.previous_page %}
        {% if paginator.previous_page == 1 %}
            <a class="newer-posts" href="{{ '/tag/' | append: (page.tag | slugify: "latin") | relative_url }}" title="Previous Page">&laquo; Newer Posts</a>
        {% else %}
            <a class="newer-posts" href="{{ '/tag/' | append: (page.tag | slugify: "latin") | append: '/page' | append: paginator.previous_page | append: '/' | relative_url }}" title="Previous Page">&laquo; Newer Posts</a>
      {% endif %}
    {% endif %}
    <span class="page-number"> Page {{ paginator.page }} of {{ paginator.total_pages }} </span>
    {% if paginator.next_page %}
        <a class="older-posts" href="{{ '/tag/' | append: (page.tag | slugify: "latin") | append: '/page' | append: paginator.next_page | append: '/' | relative_url }}" title="Next Page">Older Posts &raquo;</a>
    {% endif %}
</nav>
